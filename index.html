<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Спи">
    <meta name="theme-color" content="#0a0807">
    <meta name="description" content="A cat that is tired of your excuses.">
    <link rel="manifest" href="/manifest.json">
    <title>Спи</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Courier+Prime&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg: #0a0807;
        --bg-deep: #050302;
        --glow-primary: #d4a574;
        --glow-ember: #b85c3a;
        --text: #e8dcc4;
        --text-muted: #6b5d4a;
        --text-dim: #3d3528;
        --error: #8b3a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 20px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: manipulation;
    }

    /* grain overlay for low-light bar texture */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        opacity: 0.18;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
    }

    /* vignette from edges for depth */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9;
        background: radial-gradient(ellipse at center, transparent 40%, var(--bg-deep) 100%);
    }

    .stage {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: 1fr auto auto;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        z-index: 1;
    }

    /* ---------- Start overlay: iOS audio-gesture gate + entry moment ---------- */

    .start-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        cursor: pointer;
        transition: opacity 1.2s ease;
    }

    .start-overlay.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .start-overlay .title {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(34px, 9vw, 52px);
        color: var(--text);
        letter-spacing: 0.02em;
    }

    .start-overlay .prompt {
        font-family: 'Courier Prime', monospace;
        font-size: 13px;
        letter-spacing: 0.3em;
        color: var(--text-muted);
        text-transform: uppercase;
        animation: pulse-prompt 2.4s ease-in-out infinite;
    }

    @keyframes pulse-prompt {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.9; }
    }

    /* ---------- Cat stage ---------- */

    .cat-area {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .cat-glow {
        position: absolute;
        width: 75vmin;
        height: 75vmin;
        border-radius: 50%;
        background: radial-gradient(circle,
            rgba(212, 165, 116, 0.35) 0%,
            rgba(184, 92, 58, 0.16) 30%,
            transparent 62%);
        filter: blur(18px);
        animation: breathe 6s ease-in-out infinite;
        transition: all 1.5s ease;
    }

    @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.04); opacity: 1; }
    }

    .stage.speaking .cat-glow {
        animation-duration: 2.4s;
        background: radial-gradient(circle,
            rgba(212, 165, 116, 0.5) 0%,
            rgba(184, 92, 58, 0.25) 30%,
            transparent 62%);
    }

    .stage.listening .cat-glow {
        background: radial-gradient(circle,
            rgba(212, 165, 116, 0.45) 0%,
            rgba(184, 92, 58, 0.2) 30%,
            transparent 62%);
    }

    .stage.complete .cat-glow {
        animation-duration: 12s;
        opacity: 0.35;
        background: radial-gradient(circle,
            rgba(212, 165, 116, 0.2) 0%,
            transparent 55%);
    }

    .cat {
        position: relative;
        width: min(280px, 62vmin);
        height: min(280px, 62vmin);
        z-index: 2;
        transition: transform 0.8s ease;
    }

    .cat svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 14px 34px rgba(0,0,0,0.65));
    }

    /* ---------- Subtitle ---------- */

    .subtitle {
        padding: 20px 8vw 30px;
        text-align: center;
        min-height: 4.5em;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(20px, 5.2vw, 28px);
        color: var(--text);
        letter-spacing: 0.012em;
        opacity: 0;
        transition: opacity 0.6s ease;
        text-wrap: balance;
    }

    .subtitle.visible {
        opacity: 1;
    }

    .subtitle.user-quote {
        color: var(--text-muted);
        font-size: clamp(16px, 4vw, 20px);
        font-style: normal;
    }

    /* ---------- Controls ---------- */

    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 0 0 8vh;
    }

    .record-button {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: transparent;
        border: 2px solid var(--glow-primary);
        color: var(--glow-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        position: relative;
    }

    .record-button:active:not(:disabled) {
        transform: scale(0.94);
    }

    .record-button.recording {
        background: var(--glow-ember);
        border-color: var(--glow-ember);
        color: var(--bg-deep);
        animation: pulse-record 1.3s ease-in-out infinite;
    }

    @keyframes pulse-record {
        0%, 100% { box-shadow: 0 0 0 0 rgba(184, 92, 58, 0.55); }
        50% { box-shadow: 0 0 0 20px rgba(184, 92, 58, 0); }
    }

    .record-button svg {
        width: 30px;
        height: 30px;
    }

    .record-button:disabled {
        opacity: 0.25;
        cursor: not-allowed;
    }

    .state-label {
        font-family: 'Courier Prime', monospace;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        min-height: 1em;
        text-align: center;
    }

    .goodnight-button {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-family: 'Courier Prime', monospace;
        font-size: 12px;
        letter-spacing: 0.14em;
        padding: 10px 18px;
        cursor: pointer;
        opacity: 0.55;
        transition: opacity 0.3s ease;
        text-transform: lowercase;
    }

    .goodnight-button:hover,
    .goodnight-button:active {
        opacity: 1;
    }

    .goodnight-button:disabled {
        opacity: 0.15;
        cursor: not-allowed;
    }

    /* ---------- Dev + error ---------- */

    .dev-info {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        right: 12px;
        font-family: 'Courier Prime', monospace;
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        z-index: 20;
        text-align: right;
        pointer-events: none;
    }

    .error-banner {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--error);
        color: var(--text);
        padding: 10px 20px;
        border-radius: 3px;
        font-family: 'Courier Prime', monospace;
        font-size: 12px;
        letter-spacing: 0.1em;
        z-index: 30;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
        max-width: 90vw;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .error-banner.visible {
        opacity: 1;
    }
    </style>
</head>
<body>

    <!-- Entry gate: covers page until first tap (iOS audio unlock + thematic entry) -->
    <div class="start-overlay" id="startOverlay">
        <div class="title">Спи</div>
        <div class="prompt">tap to enter</div>
    </div>

    <div class="stage" id="stage">

        <div class="cat-area">
            <div class="cat-glow"></div>
            <div class="cat" id="cat">
                <!-- Placeholder cat silhouette. Will be replaced by Midjourney assets in Sprint 2. -->
                <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-label="Cat">
                    <defs>
                        <radialGradient id="catGrad" cx="50%" cy="35%" r="65%">
                            <stop offset="0%" stop-color="#1d1813"/>
                            <stop offset="100%" stop-color="#050302"/>
                        </radialGradient>
                    </defs>
                    <!-- Ears -->
                    <path d="M 62 38 L 72 8 L 94 34 Z" fill="url(#catGrad)"/>
                    <path d="M 138 38 L 128 8 L 106 34 Z" fill="url(#catGrad)"/>
                    <!-- Inner ear hint -->
                    <path d="M 74 24 L 80 16 L 86 28 Z" fill="#2a1f1a" opacity="0.8"/>
                    <path d="M 126 24 L 120 16 L 114 28 Z" fill="#2a1f1a" opacity="0.8"/>
                    <!-- Head -->
                    <ellipse cx="100" cy="58" rx="46" ry="40" fill="url(#catGrad)"/>
                    <!-- Body -->
                    <ellipse cx="100" cy="158" rx="56" ry="60" fill="url(#catGrad)"/>
                    <!-- Tail curl around side -->
                    <path d="M 152 182 Q 184 160 178 128 Q 172 106 158 116" stroke="url(#catGrad)" stroke-width="16" fill="none" stroke-linecap="round"/>
                    <!-- Eyes: warm amber glints -->
                    <ellipse cx="84" cy="56" rx="3.5" ry="5.5" fill="#d4a574" opacity="0.92"/>
                    <ellipse cx="116" cy="56" rx="3.5" ry="5.5" fill="#d4a574" opacity="0.92"/>
                    <!-- Nose shadow -->
                    <ellipse cx="100" cy="70" rx="3" ry="2" fill="#3d2a1e" opacity="0.7"/>
                    <!-- Jacket collar: diagonal across chest -->
                    <path d="M 70 130 L 130 148" stroke="#2a1f1a" stroke-width="4" opacity="0.75" stroke-linecap="round"/>
                    <path d="M 66 142 L 134 158" stroke="#1a120d" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <div class="subtitle" id="subtitle"></div>

        <div class="controls">
            <button class="record-button" id="recordBtn" aria-label="Speak to the cat" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3zm7 10a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-1.06A9 9 0 0 0 21 12h-2z"/>
                </svg>
            </button>
            <div class="state-label" id="stateLabel">&nbsp;</div>
            <button class="goodnight-button" id="goodnightBtn" disabled>i'm going to bed</button>
        </div>

    </div>

    <div class="dev-info" id="devInfo">v0.1</div>
    <div class="error-banner" id="errorBanner"></div>

<script>
'use strict';

// ============================================================================
// СПИ, КОШАК — Sprint 1
// Persona validation loop. No DB, no memory between opens, no notifications yet.
// State kept client-side in a single conversation array.
// ============================================================================

const S = {
    phase: 'gated',              // gated | loading | idle | listening | processing | speaking | complete
    catState: 'neutral',         // neutral | listening | dismissive | disappointed | gotcha | happy | sleeping
    conversation: [],            // Anthropic messages shape: [{role, content}]
    recorder: null,
    audioChunks: [],
    stream: null,
    recording: false,
    speaking: false,
    recordedMime: '',
    started: false,
};

const UI = {
    stage: document.getElementById('stage'),
    subtitle: document.getElementById('subtitle'),
    recordBtn: document.getElementById('recordBtn'),
    goodnightBtn: document.getElementById('goodnightBtn'),
    stateLabel: document.getElementById('stateLabel'),
    errorBanner: document.getElementById('errorBanner'),
    devInfo: document.getElementById('devInfo'),
    startOverlay: document.getElementById('startOverlay'),
};

// ---------- Small helpers ----------

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(blob);
    });
}

function base64ToBlob(base64, mimeType) {
    const chars = atob(base64);
    const bytes = new Uint8Array(chars.length);
    for (let i = 0; i < chars.length; i++) bytes[i] = chars.charCodeAt(i);
    return new Blob([bytes], { type: mimeType });
}

function filenameForMime(mime) {
    if (!mime) return 'audio.webm';
    if (mime.includes('webm')) return 'audio.webm';
    if (mime.includes('mp4'))  return 'audio.m4a';
    if (mime.includes('ogg'))  return 'audio.ogg';
    if (mime.includes('wav'))  return 'audio.wav';
    return 'audio.webm';
}

// ---------- UI state ----------

const PHASE_LABELS = {
    gated:      '',
    loading:    'waking',
    idle:       'tap to speak',
    listening:  'listening',
    processing: 'thinking',
    speaking:   '',
    complete:   'good night',
};

function setPhase(phase) {
    S.phase = phase;
    UI.stage.classList.toggle('speaking', phase === 'speaking');
    UI.stage.classList.toggle('listening', phase === 'listening');
    UI.stage.classList.toggle('complete',  phase === 'complete');

    UI.stateLabel.textContent = PHASE_LABELS[phase] ?? '';

    const blockRecord = phase === 'processing' || phase === 'speaking' || phase === 'complete' || phase === 'loading' || phase === 'gated';
    UI.recordBtn.disabled = blockRecord;

    const blockGoodnight = phase === 'complete' || phase === 'loading' || phase === 'gated' || phase === 'processing' || phase === 'speaking';
    UI.goodnightBtn.disabled = blockGoodnight;

    updateDevInfo();
}

function setCatState(state) {
    S.catState = state || 'neutral';
    updateDevInfo();
    // Sprint 2: swap the SVG / image based on state.
}

function updateDevInfo() {
    UI.devInfo.textContent = `v0.1 · ${S.phase} · ${S.catState}`;
}

function setSubtitle(text, { userQuote = false } = {}) {
    UI.subtitle.textContent = text || '';
    UI.subtitle.classList.toggle('user-quote', userQuote);
    UI.subtitle.classList.toggle('visible', !!text);
}

function showError(msg) {
    UI.errorBanner.textContent = msg;
    UI.errorBanner.classList.add('visible');
    clearTimeout(showError._t);
    showError._t = setTimeout(() => UI.errorBanner.classList.remove('visible'), 4500);
}

// ---------- API layer ----------

async function callClaude(messages, _attempt = 0) {
    const MAX_RETRIES = 6;
    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages })
        });

        if ((res.status === 529 || res.status === 503) && _attempt < MAX_RETRIES) {
            const waitMs = Math.min(Math.pow(2, _attempt) * 1000, 30000);
            UI.stateLabel.textContent = `busy · retry ${_attempt + 1}/${MAX_RETRIES}`;
            await sleep(waitMs);
            return callClaude(messages, _attempt + 1);
        }

        if (res.status === 401) { showError('API key problem'); return null; }
        if (res.status === 400) { showError('request error'); return null; }
        if (!res.ok) {
            const body = await res.text();
            console.error('Claude API non-ok:', res.status, body);
            throw new Error('Upstream error');
        }

        const data = await res.json();
        const content = data?.content?.[0]?.text;
        if (!content) {
            console.error('Claude returned no content:', data);
            showError('empty response');
            return null;
        }

        const cleaned = content.replace(/```json/gi, '').replace(/```/g, '').trim();
        try {
            const parsed = JSON.parse(cleaned);
            // Light shape validation
            if (typeof parsed.text !== 'string' || parsed.text.length === 0) {
                console.error('Parsed Claude JSON missing text field:', parsed);
                showError('bad response shape');
                return null;
            }
            return parsed;
        } catch (e) {
            // Parse failure — Claude occasionally returns a preamble or markdown fence
            // despite instructions. One silent retry before surfacing to the user.
            if (_attempt === 0) {
                console.warn('Parse failed, retrying once. Raw content:', content);
                await sleep(800);
                return callClaude(messages, _attempt + 1);
            }
            console.error('Failed to parse Claude JSON after retry. Raw:', content);
            showError('parse error');
            return null;
        }
    } catch (err) {
        console.error('Claude call failed:', err);
        showError('connection failed');
        return null;
    }
}

async function transcribe(blob, mimeType) {
    const MAX_BYTES = 4 * 1024 * 1024;
    if (blob.size > MAX_BYTES) {
        showError('recording too long');
        return null;
    }

    try {
        const audioBase64 = await blobToBase64(blob);
        const res = await fetch('/.netlify/functions/whisper', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audioBase64, filename: filenameForMime(mimeType) })
        });
        const data = await res.json();
        if (!res.ok) {
            console.error('Whisper failed:', data);
            showError('could not hear you');
            return null;
        }
        return (data.text || '').trim();
    } catch (err) {
        console.error('Transcription error:', err);
        showError('transcription failed');
        return null;
    }
}

async function speak(text) {
    if (!text) return;
    S.speaking = true;
    setPhase('speaking');
    setSubtitle(text);

    try {
        const res = await fetch('/.netlify/functions/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: 'onyx', speed: 0.72 })
        });
        if (!res.ok) throw new Error('TTS not ok');
        const { audioBase64 } = await res.json();

        await new Promise((resolve) => {
            const blob = base64ToBlob(audioBase64, 'audio/mpeg');
            const url  = URL.createObjectURL(blob);
            const audio = new Audio(url);
            const cleanup = () => {
                URL.revokeObjectURL(url);
                S.speaking = false;
                resolve();
            };
            audio.onended = cleanup;
            audio.onerror = cleanup;
            audio.play().catch((e) => {
                console.error('Audio play rejected:', e);
                cleanup();
            });
        });
    } catch (err) {
        console.error('TTS error:', err);
        // Text remains on screen so the user can still read what the cat said.
        S.speaking = false;
    }
}

// ---------- Recording ----------

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true,
            }
        });
        S.stream = stream;
        S.audioChunks = [];

        let mimeType = '';
        for (const t of ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg']) {
            if (MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
        }
        S.recordedMime = mimeType;

        S.recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        S.recorder.ondataavailable = (e) => {
            if (e.data.size > 0) S.audioChunks.push(e.data);
        };
        S.recorder.onerror = (e) => {
            console.error('Recorder error:', e);
            showError('recording error');
        };
        S.recorder.start(100);

        S.recording = true;
        UI.recordBtn.classList.add('recording');
        setPhase('listening');
        setCatState('listening');
    } catch (err) {
        console.error('Mic denied:', err);
        showError('microphone access needed');
        setPhase('idle');
    }
}

function stopRecording() {
    return new Promise((resolve) => {
        if (!S.recorder || S.recorder.state === 'inactive') {
            resolve(null);
            return;
        }
        S.recorder.onstop = () => {
            const blob = new Blob(S.audioChunks, { type: S.recorder.mimeType || 'audio/webm' });
            if (S.stream) {
                S.stream.getTracks().forEach((t) => t.stop());
                S.stream = null;
            }
            S.recording = false;
            UI.recordBtn.classList.remove('recording');
            resolve(blob);
        };
        try {
            S.recorder.stop();
        } catch (e) {
            resolve(null);
        }
    });
}

// ---------- Conversation turns ----------

async function runOpening() {
    setPhase('loading');
    setSubtitle('');

    // Kickoff: a short user turn that asks Claude to produce the opening line.
    // We keep it in S.conversation so subsequent turns have coherent context
    // (the cat's opening is real history the cat "said" at the top of the session).
    S.conversation.push({
        role: 'user',
        content: 'I just opened the app. Give me a short opening line — vary it from a typical greeting, one or two sentences. JSON only.'
    });

    const response = await callClaude(S.conversation);
    if (!response) {
        setSubtitle('(the cat is quiet tonight)');
        setPhase('idle');
        return;
    }

    S.conversation.push({ role: 'assistant', content: response.text });

    setCatState(response.state || 'neutral');
    await speak(response.text);

    if (response.complete) {
        endSession();
    } else {
        setPhase('idle');
        setCatState('neutral');
    }
}

async function handleUserTurn(userText) {
    if (!userText) {
        setPhase('idle');
        return;
    }

    setPhase('processing');
    setSubtitle(`"${userText}"`, { userQuote: true });

    S.conversation.push({ role: 'user', content: userText });

    const response = await callClaude(S.conversation);
    if (!response) {
        // Roll back the user turn so retry is clean
        S.conversation.pop();
        setPhase('idle');
        return;
    }

    S.conversation.push({ role: 'assistant', content: response.text });
    setCatState(response.state || 'neutral');
    await speak(response.text);

    if (response.complete) {
        endSession();
    } else {
        setPhase('idle');
        setCatState('neutral');
    }
}

async function handleGoodnightButton() {
    if (S.phase !== 'idle') return;
    await handleUserTurn("I'm going to bed.");
}

function endSession() {
    setPhase('complete');
    setCatState('sleeping');
}

// ---------- Record button ----------

async function toggleRecord() {
    if (S.phase === 'idle') {
        await startRecording();
        return;
    }
    if (S.phase === 'listening' && S.recording) {
        const blob = await stopRecording();
        if (!blob || blob.size === 0) {
            setPhase('idle');
            return;
        }
        setPhase('processing');
        setSubtitle('');
        const text = await transcribe(blob, S.recordedMime);
        if (!text) {
            setPhase('idle');
            return;
        }
        await handleUserTurn(text);
    }
}

UI.recordBtn.addEventListener('click', toggleRecord);
UI.goodnightBtn.addEventListener('click', handleGoodnightButton);

// ---------- Boot ----------

async function begin() {
    if (S.started) return;
    S.started = true;

    UI.startOverlay.classList.add('hidden');

    // Play a silent unlock sound on iOS to enable audio later (required after first gesture)
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        gain.gain.value = 0;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(0);
        osc.stop(ctx.currentTime + 0.01);
    } catch (e) {
        // Non-fatal
    }

    await sleep(400); // Let the overlay fade before loading state appears
    setPhase('idle');
    await runOpening();
}

UI.startOverlay.addEventListener('click', begin);
UI.startOverlay.addEventListener('touchend', (e) => {
    e.preventDefault();
    begin();
}, { passive: false });

// Initial state
setPhase('gated');
</script>
