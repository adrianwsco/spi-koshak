<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Спи">
    <meta name="theme-color" content="#0a0807">
    <meta name="description" content="A cat that is tired of your excuses.">
    <link rel="manifest" href="/manifest.json">
    <title>Спи</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Courier+Prime&display=swap" rel="stylesheet">

    <style>
    /* ========================================================================
       CAT VISUAL SYSTEM — tune these to taste (Phase 1.5 integration)
       ======================================================================== */
    :root {
        --bg: #0a0807;
        --bg-deep: #050302;
        --text: #e8dcc4;
        --text-muted: #6b5d4a;
        --text-dim: #3d3528;
        --error: #8b3a2a;
        --record-fill: #d4a574;
        --record-active: #b85c3a;

        /* Glow colors per cat state */
        --glow-listening:     rgba(255, 200, 100, 0.65);
        --glow-happy:         rgba(255, 170,  50, 0.85);
        --glow-gotcha:        rgba(230,  40,  30, 0.80);
        --glow-dismissive:    rgba( 90, 115, 155, 0.85);
        --glow-disappointed:  rgba( 45,  30,  90, 0.90);
        --glow-sleeping:      rgba( 30,  45, 110, 0.75);

        /* Per-state pulse cycle durations */
        --pulse-happy:        3.0s;
        --pulse-listening:    2.4s;
        --pulse-dismissive:   4.0s;
        --pulse-disappointed: 5.0s;
        --pulse-sleeping:     6.0s;

        /* Glow behavior */
        --glow-transition: 1.0s;
        --glow-blend:      hard-light;
        --glow-spread:     95%;

        /* Per-state image alignment.
           All three MJ images are 2:3 but cat sits at different Y positions.
           Nudge these if the cat appears to jump between states on your device.
           Positive translateY = image shifts DOWN (cat moves toward bottom).
           Scale > 1 = zoom in (crops edges). Scale < 1 = zoom out (shows more). */
        --counter-scale:   1.00;
        --counter-offset:  0%;
        --stool-scale:     1.00;
        --stool-offset:    0%;
        --sleeping-scale:  1.00;
        --sleeping-offset: 0%;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 20px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: manipulation;
    }

    /* grain overlay — low-light bar texture */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        opacity: 0.18;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
    }

    /* vignette from edges */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9;
        background: radial-gradient(ellipse at center, transparent 40%, var(--bg-deep) 100%);
    }

    .stage {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: 1fr auto auto;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        z-index: 1;
    }

    /* ---------- Start overlay ---------- */

    .start-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        cursor: pointer;
        transition: opacity 1.2s ease;
    }

    .start-overlay.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .start-overlay .title {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(34px, 9vw, 52px);
        color: var(--text);
        letter-spacing: 0.02em;
    }

    .start-overlay .prompt {
        font-family: 'Courier Prime', monospace;
        font-size: 13px;
        letter-spacing: 0.3em;
        color: var(--text-muted);
        text-transform: uppercase;
        animation: pulse-prompt 2.4s ease-in-out infinite;
    }

    @keyframes pulse-prompt {
        0%, 100% { opacity: 0.4; }
        50%      { opacity: 0.9; }
    }

    /* ---------- Cat stage ---------- */

    .cat-area {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        min-height: 0;
        padding: 12px;
    }

    .cat-stage {
        position: relative;
        aspect-ratio: 2 / 3;
        height: 100%;
        max-width: 100%;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.65);
    }

    .cat-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity var(--glow-transition) ease;
        transform-origin: center center;
    }

    .cat-image.active { opacity: 1; }

    /* Per-state alignment — subtle image positioning to reduce jump between states */
    .cat-image.cat-counter  { transform: translateY(var(--counter-offset))  scale(var(--counter-scale)); }
    .cat-image.cat-stool    { transform: translateY(var(--stool-offset))    scale(var(--stool-scale)); }
    .cat-image.cat-sleeping { transform: translateY(var(--sleeping-offset)) scale(var(--sleeping-scale)); }

    /* ---------- State glow overlay ---------- */

    .cat-glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        mix-blend-mode: var(--glow-blend);
        opacity: 0;
        transition: opacity var(--glow-transition) ease,
                    background var(--glow-transition) ease;
        background: radial-gradient(circle at center, transparent, transparent);
    }

    .cat-glow.listening {
        opacity: 1;
        background: radial-gradient(circle at 50% 45%, var(--glow-listening), transparent var(--glow-spread));
        animation: pulseMedium var(--pulse-listening) ease-in-out infinite;
    }
    .cat-glow.happy {
        opacity: 1;
        background: radial-gradient(circle at 50% 55%, var(--glow-happy), transparent var(--glow-spread));
        animation: pulseStrong var(--pulse-happy) ease-in-out infinite;
    }
    .cat-glow.gotcha {
        opacity: 1;
        background: radial-gradient(circle at 50% 40%, var(--glow-gotcha), transparent var(--glow-spread));
        animation: gotchaFlash 1.2s ease-out 1;
    }
    .cat-glow.dismissive {
        opacity: 1;
        background: radial-gradient(circle at 50% 40%, var(--glow-dismissive), transparent var(--glow-spread));
        animation: pulseSubtle var(--pulse-dismissive) ease-in-out infinite;
    }
    .cat-glow.disappointed {
        opacity: 1;
        background: radial-gradient(circle at 50% 40%, var(--glow-disappointed), transparent var(--glow-spread));
        animation: pulseSubtle var(--pulse-disappointed) ease-in-out infinite;
    }
    .cat-glow.sleeping {
        opacity: 1;
        background: radial-gradient(circle at 50% 50%, var(--glow-sleeping), transparent var(--glow-spread));
        animation: pulseDeep var(--pulse-sleeping) ease-in-out infinite;
    }

    @keyframes pulseStrong {
        0%, 100% { filter: brightness(1); }
        50%      { filter: brightness(1.35); }
    }
    @keyframes pulseMedium {
        0%, 100% { filter: brightness(1); }
        50%      { filter: brightness(1.2); }
    }
    @keyframes pulseSubtle {
        0%, 100% { filter: brightness(0.95); }
        50%      { filter: brightness(1.1); }
    }
    @keyframes pulseDeep {
        0%, 100% { filter: brightness(0.85); }
        50%      { filter: brightness(1.1); }
    }
    @keyframes gotchaFlash {
        0%   { opacity: 0; }
        15%  { opacity: 1.4; }
        100% { opacity: 1; }
    }

    /* ---------- Subtitle ---------- */

    .subtitle {
        padding: 20px 8vw 30px;
        text-align: center;
        min-height: 4.5em;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(20px, 5.2vw, 28px);
        color: var(--text);
        letter-spacing: 0.012em;
        opacity: 0;
        transition: opacity 0.6s ease;
        text-wrap: balance;
    }

    .subtitle.visible { opacity: 1; }

    .subtitle.user-quote {
        color: var(--text-muted);
        font-size: clamp(16px, 4vw, 20px);
        font-style: normal;
    }

    /* ---------- Controls ---------- */

    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 0 0 8vh;
    }

    .record-button {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: transparent;
        border: 2px solid var(--record-fill);
        color: var(--record-fill);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        position: relative;
    }

    .record-button:active:not(:disabled) { transform: scale(0.94); }

    .record-button.recording {
        background: var(--record-active);
        border-color: var(--record-active);
        color: var(--bg-deep);
        animation: pulse-record 1.3s ease-in-out infinite;
    }

    @keyframes pulse-record {
        0%, 100% { box-shadow: 0 0 0 0 rgba(184, 92, 58, 0.55); }
        50%      { box-shadow: 0 0 0 20px rgba(184, 92, 58, 0); }
    }

    .record-button svg { width: 30px; height: 30px; }
    .record-button:disabled { opacity: 0.25; cursor: not-allowed; }

    .state-label {
        font-family: 'Courier Prime', monospace;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        min-height: 1em;
        text-align: center;
    }

    .goodnight-button {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-family: 'Courier Prime', monospace;
        font-size: 12px;
        letter-spacing: 0.14em;
        padding: 10px 18px;
        cursor: pointer;
        opacity: 0.55;
        transition: opacity 0.3s ease;
        text-transform: lowercase;
    }

    .goodnight-button:hover,
    .goodnight-button:active { opacity: 1; }
    .goodnight-button:disabled { opacity: 0.15; cursor: not-allowed; }

    /* ---------- Dev + error ---------- */

    .dev-info {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        right: 12px;
        font-family: 'Courier Prime', monospace;
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        z-index: 20;
        text-align: right;
        pointer-events: none;
    }

    .error-banner {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--error);
        color: var(--text);
        padding: 10px 20px;
        border-radius: 3px;
        font-family: 'Courier Prime', monospace;
        font-size: 12px;
        letter-spacing: 0.1em;
        z-index: 30;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
        max-width: 90vw;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .error-banner.visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="start-overlay" id="startOverlay">
        <div class="title">Спи</div>
        <div class="prompt">tap to enter</div>
    </div>

    <div class="stage" id="stage">

        <div class="cat-area">
            <div class="cat-stage">
                <img class="cat-image cat-counter active" id="imgCounter"
                     src="/assets/cat_counter.png" alt="" draggable="false">
                <img class="cat-image cat-stool" id="imgStool"
                     src="/assets/cat_stool.png" alt="" draggable="false">
                <img class="cat-image cat-sleeping" id="imgSleeping"
                     src="/assets/cat_sleeping.png" alt="" draggable="false">
                <div class="cat-glow" id="catGlow"></div>
            </div>
        </div>

        <div class="subtitle" id="subtitle"></div>

        <div class="controls">
            <button class="record-button" id="recordBtn" aria-label="Speak to the cat" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3zm7 10a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-1.06A9 9 0 0 0 21 12h-2z"/>
                </svg>
            </button>
            <div class="state-label" id="stateLabel">&nbsp;</div>
            <button class="goodnight-button" id="goodnightBtn" disabled>i'm going to bed</button>
        </div>

    </div>

    <div class="dev-info" id="devInfo">v0.2</div>
    <div class="error-banner" id="errorBanner"></div>

<script>
'use strict';

// ============================================================================
// СПИ, КОШАК — Sprint 1.5
// Persona validation loop + visual integration (MJ heroes + state glow system).
// ============================================================================

const S = {
    phase: 'gated',
    catState: 'neutral',
    conversation: [],
    recorder: null,
    audioChunks: [],
    stream: null,
    recording: false,
    speaking: false,
    recordedMime: '',
    started: false,
};

const UI = {
    stage:        document.getElementById('stage'),
    subtitle:     document.getElementById('subtitle'),
    recordBtn:    document.getElementById('recordBtn'),
    goodnightBtn: document.getElementById('goodnightBtn'),
    stateLabel:   document.getElementById('stateLabel'),
    errorBanner:  document.getElementById('errorBanner'),
    devInfo:      document.getElementById('devInfo'),
    startOverlay: document.getElementById('startOverlay'),
    catGlow:      document.getElementById('catGlow'),
    imgCounter:   document.getElementById('imgCounter'),
    imgStool:     document.getElementById('imgStool'),
    imgSleeping:  document.getElementById('imgSleeping'),
};

// State → { image, glow } mapping.
// Two heroes cover five states; sleeping has its own hero.
const STATE_MAP = {
    neutral:      { image: 'counter',  glow: null           },
    listening:    { image: 'counter',  glow: 'listening'    },
    happy:        { image: 'stool',    glow: 'happy'        },
    gotcha:       { image: 'counter',  glow: 'gotcha'       },
    dismissive:   { image: 'counter',  glow: 'dismissive'   },
    disappointed: { image: 'counter',  glow: 'disappointed' },
    sleeping:     { image: 'sleeping', glow: 'sleeping'     },
};

// ---------- Small helpers ----------

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(blob);
    });
}

function base64ToBlob(base64, mimeType) {
    const chars = atob(base64);
    const bytes = new Uint8Array(chars.length);
    for (let i = 0; i < chars.length; i++) bytes[i] = chars.charCodeAt(i);
    return new Blob([bytes], { type: mimeType });
}

function filenameForMime(mime) {
    if (!mime) return 'audio.webm';
    if (mime.includes('webm')) return 'audio.webm';
    if (mime.includes('mp4'))  return 'audio.m4a';
    if (mime.includes('ogg'))  return 'audio.ogg';
    if (mime.includes('wav'))  return 'audio.wav';
    return 'audio.webm';
}

// ---------- UI state ----------

const PHASE_LABELS = {
    gated:      '',
    loading:    'waking',
    idle:       'tap to speak',
    listening:  'listening',
    processing: 'thinking',
    speaking:   '',
    complete:   'good night',
};

function setPhase(phase) {
    S.phase = phase;
    UI.stateLabel.textContent = PHASE_LABELS[phase] ?? '';

    const blockRecord = phase === 'processing' || phase === 'speaking' || phase === 'complete' || phase === 'loading' || phase === 'gated';
    UI.recordBtn.disabled = blockRecord;

    const blockGoodnight = phase === 'complete' || phase === 'loading' || phase === 'gated' || phase === 'processing' || phase === 'speaking';
    UI.goodnightBtn.disabled = blockGoodnight;

    updateDevInfo();
}

function setCatState(state) {
    S.catState = state || 'neutral';
    const config = STATE_MAP[S.catState] || STATE_MAP.neutral;

    // Swap visible hero image
    UI.imgCounter.classList.toggle('active',  config.image === 'counter');
    UI.imgStool.classList.toggle('active',    config.image === 'stool');
    UI.imgSleeping.classList.toggle('active', config.image === 'sleeping');

    // Reset glow, then apply current state (force animation restart)
    UI.catGlow.className = 'cat-glow';
    if (config.glow) {
        void UI.catGlow.offsetWidth;
        UI.catGlow.classList.add(config.glow);
    }

    updateDevInfo();
}

function updateDevInfo() {
    UI.devInfo.textContent = `v0.2 · ${S.phase} · ${S.catState}`;
}

function setSubtitle(text, { userQuote = false } = {}) {
    UI.subtitle.textContent = text || '';
    UI.subtitle.classList.toggle('user-quote', userQuote);
    UI.subtitle.classList.toggle('visible', !!text);
}

function showError(msg) {
    UI.errorBanner.textContent = msg;
    UI.errorBanner.classList.add('visible');
    clearTimeout(showError._t);
    showError._t = setTimeout(() => UI.errorBanner.classList.remove('visible'), 4500);
}

// ---------- API layer ----------

async function callClaude(messages, _attempt = 0) {
    const MAX_RETRIES = 6;
    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages })
        });

        if ((res.status === 529 || res.status === 503) && _attempt < MAX_RETRIES) {
            const waitMs = Math.min(Math.pow(2, _attempt) * 1000, 30000);
            UI.stateLabel.textContent = `busy · retry ${_attempt + 1}/${MAX_RETRIES}`;
            await sleep(waitMs);
            return callClaude(messages, _attempt + 1);
        }

        if (res.status === 401) { showError('API key problem'); return null; }
        if (res.status === 400) { showError('request error'); return null; }
        if (!res.ok) {
            const body = await res.text();
            console.error('Claude API non-ok:', res.status, body);
            throw new Error('Upstream error');
        }

        const data = await res.json();
        const content = data?.content?.[0]?.text;
        if (!content) {
            console.error('Claude returned no content:', data);
            showError('empty response');
            return null;
        }

        const cleaned = content.replace(/```json/gi, '').replace(/```/g, '').trim();
        try {
            const parsed = JSON.parse(cleaned);
            if (typeof parsed.text !== 'string' || parsed.text.length === 0) {
                console.error('Parsed Claude JSON missing text field:', parsed);
                showError('bad response shape');
                return null;
            }
            return parsed;
        } catch (e) {
            if (_attempt === 0) {
                console.warn('Parse failed, retrying once. Raw content:', content);
                await sleep(800);
                return callClaude(messages, _attempt + 1);
            }
            console.error('Failed to parse Claude JSON after retry. Raw:', content);
            showError('parse error');
            return null;
        }
    } catch (err) {
        console.error('Claude call failed:', err);
        showError('connection failed');
        return null;
    }
}

async function transcribe(blob, mimeType) {
    const MAX_BYTES = 4 * 1024 * 1024;
    if (blob.size > MAX_BYTES) {
        showError('recording too long');
        return null;
    }

    try {
        const audioBase64 = await blobToBase64(blob);
        const res = await fetch('/.netlify/functions/whisper', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audioBase64, filename: filenameForMime(mimeType) })
        });
        const data = await res.json();
        if (!res.ok) {
            console.error('Whisper failed:', data);
            showError('could not hear you');
            return null;
        }
        return (data.text || '').trim();
    } catch (err) {
        console.error('Transcription error:', err);
        showError('transcription failed');
        return null;
    }
}

async function speak(text) {
    if (!text) return;
    S.speaking = true;
    setPhase('speaking');
    setSubtitle(text);

    try {
        const res = await fetch('/.netlify/functions/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: 'onyx', speed: 0.73 })
        });
        if (!res.ok) throw new Error('TTS not ok');
        const { audioBase64 } = await res.json();

        await new Promise((resolve) => {
            const blob = base64ToBlob(audioBase64, 'audio/mpeg');
            const url  = URL.createObjectURL(blob);
            const audio = new Audio(url);
            const cleanup = () => {
                URL.revokeObjectURL(url);
                S.speaking = false;
                resolve();
            };
            audio.onended = cleanup;
            audio.onerror = cleanup;
            audio.play().catch((e) => {
                console.error('Audio play rejected:', e);
                cleanup();
            });
        });
    } catch (err) {
        console.error('TTS error:', err);
        S.speaking = false;
    }
}

// ---------- Recording ----------

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true,
                noiseSuppression: true,
            }
        });
        S.stream = stream;
        S.audioChunks = [];

        let mimeType = '';
        for (const t of ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg']) {
            if (MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
        }
        S.recordedMime = mimeType;

        S.recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        S.recorder.ondataavailable = (e) => {
            if (e.data.size > 0) S.audioChunks.push(e.data);
        };
        S.recorder.onerror = (e) => {
            console.error('Recorder error:', e);
            showError('recording error');
        };
        S.recorder.start(100);

        S.recording = true;
        UI.recordBtn.classList.add('recording');
        setPhase('listening');
        setCatState('listening');
    } catch (err) {
        console.error('Mic denied:', err);
        showError('microphone access needed');
        setPhase('idle');
    }
}

function stopRecording() {
    return new Promise((resolve) => {
        if (!S.recorder || S.recorder.state === 'inactive') {
            resolve(null);
            return;
        }
        S.recorder.onstop = () => {
            const blob = new Blob(S.audioChunks, { type: S.recorder.mimeType || 'audio/webm' });
            if (S.stream) {
                S.stream.getTracks().forEach((t) => t.stop());
                S.stream = null;
            }
            S.recording = false;
            UI.recordBtn.classList.remove('recording');
            resolve(blob);
        };
        try {
            S.recorder.stop();
        } catch (e) {
            resolve(null);
        }
    });
}

// ---------- Conversation turns ----------

async function runOpening() {
    setPhase('loading');
    setSubtitle('');

    S.conversation.push({
        role: 'user',
        content: 'I just opened the app. Give me a short opening line — vary it from a typical greeting, one or two sentences. JSON only.'
    });

    const response = await callClaude(S.conversation);
    if (!response) {
        setSubtitle('(the cat is quiet tonight)');
        setPhase('idle');
        return;
    }

    S.conversation.push({ role: 'assistant', content: response.text });

    setCatState(response.state || 'neutral');
    await speak(response.text);

    if (response.complete) {
        endSession();
    } else {
        setPhase('idle');
        setCatState('neutral');
    }
}

async function handleUserTurn(userText) {
    if (!userText) {
        setPhase('idle');
        return;
    }

    setPhase('processing');
    setSubtitle(`"${userText}"`, { userQuote: true });

    S.conversation.push({ role: 'user', content: userText });

    const response = await callClaude(S.conversation);
    if (!response) {
        S.conversation.pop();
        setPhase('idle');
        return;
    }

    S.conversation.push({ role: 'assistant', content: response.text });
    setCatState(response.state || 'neutral');
    await speak(response.text);

    if (response.complete) {
        endSession();
    } else {
        setPhase('idle');
        setCatState('neutral');
    }
}

async function handleGoodnightButton() {
    if (S.phase !== 'idle') return;
    await handleUserTurn("I'm going to bed.");
}

function endSession() {
    setPhase('complete');
    setCatState('sleeping');
}

// ---------- Record button ----------

async function toggleRecord() {
    if (S.phase === 'idle') {
        await startRecording();
        return;
    }
    if (S.phase === 'listening' && S.recording) {
        const blob = await stopRecording();
        if (!blob || blob.size === 0) {
            setPhase('idle');
            return;
        }
        setPhase('processing');
        setSubtitle('');
        const text = await transcribe(blob, S.recordedMime);
        if (!text) {
            setPhase('idle');
            return;
        }
        await handleUserTurn(text);
    }
}

UI.recordBtn.addEventListener('click', toggleRecord);
UI.goodnightBtn.addEventListener('click', handleGoodnightButton);

// ---------- Boot ----------

async function begin() {
    if (S.started) return;
    S.started = true;

    UI.startOverlay.classList.add('hidden');

    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        gain.gain.value = 0;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(0);
        osc.stop(ctx.currentTime + 0.01);
    } catch (e) {
        // Non-fatal
    }

    await sleep(400);
    setPhase('idle');
    await runOpening();
}

UI.startOverlay.addEventListener('click', begin);
UI.startOverlay.addEventListener('touchend', (e) => {
    e.preventDefault();
    begin();
}, { passive: false });

setPhase('gated');
setCatState('neutral');
</script>
